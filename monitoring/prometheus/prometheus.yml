global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"
  - "ceph_alerts.yml"
  - "openstack_alerts.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Pushgateway
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    honor_labels: true

  # Django Backend
  - job_name: 'django-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/metrics/'
    scrape_interval: 30s

  # RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Kafka
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9094']
    scrape_interval: 30s

  # Zookeeper
  - job_name: 'zookeeper'
    static_configs:
      - targets: ['zookeeper:8080']
    scrape_interval: 30s

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    scrape_interval: 30s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter (System metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Ceph MGR Prometheus module (ceph mgr module enable prometheus)
  - job_name: 'ceph'
    static_configs:
      - targets:
          - 'ceph-mon-1:9283'
          - 'ceph-mon-2:9283'
          - 'ceph-mon-3:9283'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # OpenStack Exporter (https://github.com/openstack-exporter/openstack-exporter)
  - job_name: 'openstack'
    static_configs:
      - targets: ['openstack-exporter:9180']
    params:
      cloud: [atonix]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # OpenStack Nova Hypervisor metrics via openstack_exporter
  - job_name: 'openstack-nova'
    static_configs:
      - targets: ['openstack-exporter:9180']
    params:
      cloud:    [atonix]
      prefix:   [openstack_nova]

  # OpenStack Neutron metrics
  - job_name: 'openstack-neutron'
    static_configs:
      - targets: ['openstack-exporter:9180']
    params:
      cloud:  [atonix]
      prefix: [openstack_neutron]

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
